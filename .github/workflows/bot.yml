name: Astromb Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # ручной запуск

jobs:
  run_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h 50m — чуть меньше 6h лимита

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt -q

      - name: Restore DB
        run: python bot/db_backup.py restore || true

      - name: Run bot (5h 45m max)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          DB_PATH: esoteric_bot.db
          PYTHONUNBUFFERED: "1"
        run: timeout 20700 python bot/main.py || true

      - name: Backup DB to repo
        if: always()
        run: |
          python bot/db_backup.py backup || true
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add db_backup.json || true
          git diff --staged --quiet || git commit -m "auto: db $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
