stages:
  - run

variables:
  DB_PATH: "esoteric_bot.db"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "1"

bot_job:
  stage: run
  image: python:3.12-slim
  timeout: 5h 45m
  before_script:
    - pip install -r requirements.txt -q
    - python bot/db_backup.py restore || true
  script:
    - timeout 20700 python bot/main.py || true
  after_script:
    - python bot/db_backup.py backup || true
    - |
      if [ -f db_backup.json ]; then
        git config user.email "ci@gitlab.com"
        git config user.name "GitLab CI"
        git remote set-url origin "https://oauth2:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
        git add db_backup.json
        git diff --staged --quiet || git commit -m "auto: db $(date -u +%Y-%m-%dT%H:%M)"
        git push origin HEAD:main || true
      fi
  only:
    - schedules
    - web
